<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pibble Paradise Clicker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Snake Button in the top left corner -->
  <button id="snake-button">
    <img src="snakebutton.png" alt="Snake">
  </button>

  <!-- Instruction Text -->
  <div id="enter-text">Press ENTER to play</div>
  
  <!-- Flyout Window for Snake Game (hidden by default) -->
  <div id="flyout-window">
    <button id="flyout-close">X</button>
    <iframe src="https://emulatoros.github.io/gfile/snake/"></iframe>
  </div>
  
  <!-- Main Game Container -->
  <div id="game-container">
    <h1>Pibble Paradise Clicker</h1>
    <p id="points">Pibble Points: 0</p>
    <button id="click-button">
      <img src="pibble.png" alt="Pibble" id="pibble-image">
    </button>
    <!-- Container for both upgrade sections -->
    <div id="upgrades-container">
      <div id="upgrades">
        <h2>Upgrades</h2>
        <div id="treat-info">
          <p>Treat Generators Owned: <span id="treat-owned">0</span></p>
          <p>Treat Generators PPS: <span id="treat-pps">0</span></p>
          <button id="treat-upgrade" disabled>Buy Treat Generator (50 Points)</button>
        </div>
        <div id="toy-info">
          <p>Toy Factories Owned: <span id="toy-owned">0</span></p>
          <p>Toy Factories PPS: <span id="toy-pps">0</span></p>
          <button id="toy-upgrade" disabled>Buy Toy Factory (200 Points)</button>
        </div>
      </div>
      <div id="click-upgrades">
        <h2>Click Upgrades</h2>
        <div>
          <p>Click Power: <span id="click-power">1</span> Pibble Points per Click</p>
          <button id="click-upgrade" disabled>Increase Click Power (100 Points)</button>
        </div>
      </div>
    </div>
    <button id="reset-button">Reset Game</button>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
