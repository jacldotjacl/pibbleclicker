<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pibble Clicker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Pibble Clicker</h1>
        
        <div class="stats">
            <div class="pibbles-count">
                Pibbles: <span id="pibbles">0</span>
            </div>
            <div class="pibbles-per-second">
                Pibbles per second: <span id="pibblesPerSecond">0</span>
            </div>
        </div>

        <div class="click-area">
            <button id="clickButton">
                <img src="pibble.png" alt="Cute Pibble" id="pibbleImage">
                Click for Pibbles!
            </button>
        </div>

        <div class="upgrades">
            <h2>Upgrades</h2>
            <!-- Upgrades will be dynamically added here -->
        </div>
    </div>
    <script src="upgrades.js"></script>
    <script src="game.js"></script>
</body>
</html>
